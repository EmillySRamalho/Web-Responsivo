<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Application Form</title>
</head>

<body>
  <div class="container">
    <form>
      <label>Nome: </label>
      <input type="text" id="name" />
      <label>Email: </label>
      <input type="email" id="email" />
      <select id="position">
        <option> Designer</option>
        <option>Programador</option>
        <option>Tester</option>

      </select>
      <section class="radio-group">
        <label>
          <input type="radio" name="availability" value="morning">
          Manhã
        </label>

        <label>
          <input type="radio" name="availability" value="afternoon">
          Tarde
        </label>

        <label>
          <input type="radio" name="availability" value="evening">
          Noite
        </label>
      </section>
      <textarea id="message"></textarea>
    </form>
  </div>
</body>

</html>
