<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Styled To-Do List</title>
  <link rel ="stylesheet" href = "styles.css">
</head>

<style>
  .sub-item-link {
    text-decoration: none;
  }

  .sub-item-link:link {
    color: red;
  }

  .sub-item-link:visited {
    color: purple;
  }

  .sub-item-link:hover{
    color: blue;
  }

  .sub-item-link:active{
    color: black
}
    .sub-item-link:focus{
    outline: green
    }
</style>

<body>
    <h1>My To Do List</h1>
  <ul class="todo-list">
    
    <li>
      <input type="checkbox" id="tarefa1">
      <label for="tarefa1">Estudar Cypress por 1 hora</label>
      <ul class="sub-item">
        <li><a class = "sub-item-link" href = "" target = "_blank">Assistir aula sobre testes E2E</a></li>
      </ul>
    </li>
    <hr>

    <li>
      <input type="checkbox" id="tarefa2">
      <label for="tarefa2">Revisar HTML e CSS</label>
      <ul class="sub-item">
        <li><a class = "sub-item-link" href = "" target = "_blank">Revisar tags semânticas</a></li>
      </ul>
    </li>
    <hr>

    <li>
      <input type="checkbox" id="tarefa3">
      <label for="tarefa3">Praticar JavaScript</label>
      <ul class="sub-item">
        <li><a class = "sub-item-link" href = "" target = "_blank">Fazer exercícios de lógica</a></li>
      </ul>
    </li>
  <hr>
    <li>
      <input type="checkbox" id="tarefa4">
      <label for="tarefa4">Atualizar LinkedIn</label>
      <ul class="sub-item">
        <li><a class = "sub-item-link" href = "" target = "_blank">Atualizar resumo profissional</a></li>
      </ul>
    </li>

  </ul>
</body>

</html>
